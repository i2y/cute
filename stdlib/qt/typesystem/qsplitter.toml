# Typesystem for `stdlib/qt/qsplitter.qpi`. QSplitter arranges
# child widgets horizontally or vertically with a draggable
# handle between each pair.


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QSplitter"
kind = "object"
header = "${qt_widgets}/qsplitter.h"
comment = """
QSplitter — horizontally / vertically arranged children with
draggable splitter handles. addWidget / insertWidget for child
management; setStretchFactor for relative sizing.
"""
include = ["addWidget", "insertWidget", "setStretchFactor"]
