# Typesystem for `stdlib/qt/qabstractscrollarea.qpi`. QAbstractScrollArea
# is the QFrame-derived parent of every scrolling widget — including
# QAbstractItemView (which all three list/tree/table views use) and
# the multi-line edit widgets (QTextEdit / QPlainTextEdit, although
# those didn't end up needing this layer in Cute's binding).


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QAbstractScrollArea"
kind = "object"
header = "${qt_widgets}/qabstractscrollarea.h"
comment = """
QAbstractScrollArea — QFrame-derived parent of every scrolling
widget. The Cute-side surface exposes the scrollbar policy
properties (vertical / horizontal / sizeAdjust) plus the
viewport / cornerWidget hooks for embedding custom content.
"""
include = ["viewport", "setViewport", "cornerWidget", "setCornerWidget"]
