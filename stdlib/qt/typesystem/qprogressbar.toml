# Typesystem for `stdlib/qt/qprogressbar.qpi`. Visual progress
# indicator. The text property is set automatically from
# `value() - minimum() / maximum() - minimum()` when the format
# string is the default `%p%`.


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QProgressBar"
kind = "object"
header = "${qt_widgets}/qprogressbar.h"
comment = """
QProgressBar — visual progress indicator with min/max/value range
and optional textual percentage display. setValue / setRange are
the common imperative API; the bar can also be put into
indeterminate mode by setting min == max == 0.
"""
include = ["setValue", "setRange", "reset"]
