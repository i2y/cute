# Typesystem for `stdlib/qt/qstatusbar.qpi`. Bottom-of-window
# message area attached to QMainWindow. showMessage with a
# timeout shows a transient status; without a timeout it
# persists until cleared.


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QStatusBar"
kind = "object"
header = "${qt_widgets}/qstatusbar.h"
comment = """
QStatusBar — bottom-of-window message area. showMessage with a
timeout shows a transient status; without a timeout the message
persists until cleared. Permanent widgets sit on the right.
"""
include = ["showMessage", "clearMessage", "addPermanentWidget", "removeWidget", "addWidget", "insertWidget"]
