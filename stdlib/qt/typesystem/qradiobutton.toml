# Typesystem for `stdlib/qt/qradiobutton.qpi`. QRadioButton has
# no Q_PROPERTYs of its own — everything (text / checkable /
# checked / clicked / toggled / autoExclusive) comes from
# QAbstractButton via inheritance.


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QRadioButton"
kind = "object"
header = "${qt_widgets}/qradiobutton.h"
comment = """
QRadioButton — exclusive selection within an autoExclusive group.
Surface lives entirely on QAbstractButton; this binding exists so
`< QRadioButton` super resolves at type-check time.
"""
include = []
