# Typesystem for `stdlib/qt/qtableview.qpi`. 2D grid model-driven
# view. Pairs with any QAbstractItemModel that exposes rowCount /
# columnCount > 0; QStandardItemModel is the common simple
# backing.


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QTableView"
kind = "object"
header = "${qt_widgets}/qtableview.h"
comment = """
QTableView — 2D grid model-driven view. Set sortingEnabled to let
users click headers to sort. Hide row / column header strips
through horizontalHeader / verticalHeader (both QHeaderView).
"""
include = ["resizeColumnsToContents", "resizeRowsToContents", "sortByColumn", "selectRow", "selectColumn"]
