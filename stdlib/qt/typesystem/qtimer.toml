# Typesystem description for `stdlib/qt/qtimer.qpi`. Driven by
# `cute-qpi-gen --typesystem stdlib/qt/typesystem/qtimer.toml`.
#
# QTimer is a `kind = "object"` class — Q_OBJECT-derived, with
# Q_PROPERTY entries that the generator scrapes from the header
# tokens. Properties show up as Cute `prop X : T` lines; the
# `timeout` signal is detected via the `Q_SIGNALS:` access section.
#
# Editorial scope: the same curated three-prop / timeout / start /
# stop surface the handcraft picked, plus whatever the auto-gen
# adds (intervalAsDuration / remainingTimeAsDuration are dropped
# below; everything else passes through).


[clang]
includes = ["${qt_core}"]
std = "c++17"

[[classes]]
name = "QTimer"
kind = "object"
header = "${qt_core}/qtimer.h"
comment = """
QTimer — single- or repeating-interval timer driven by the Qt event loop.
Auto-loaded by cute-binding so user code can write
  let t = QTimer.new(); t.start(1000)
without an external .qpi.
"""
# Curated method allowlist. The Cute prop synthesis covers
# interval / setInterval / singleShot / setSingleShot / isActive
# from the `prop` lines, so we don't need to repeat them as `fn`.
include = ["start", "stop"]
