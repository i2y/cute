# Typesystem for `stdlib/qt/qcheckbox.qpi`. QCheckBox inherits the
# bulk of its surface (text / checkable / checked / clicked /
# toggled) from QAbstractButton, which Cute resolves through the
# super-class chain. QCheckBox's own additions are the `tristate`
# property and the `stateChanged` signal.


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QCheckBox"
kind = "object"
header = "${qt_widgets}/qcheckbox.h"
comment = """
QCheckBox — clickable checkbox. Inherits text / checked / clicked /
toggled from QAbstractButton; adds the tristate Q_PROPERTY and
the stateChanged signal for explicit Qt::CheckState reads.
"""
# Qt header has `setTristate(bool y = true)` — default-arg expands
# to two overloads; both pass through. Rename the unnamed
# stateChanged param to `state` for keyword-call ergonomics.
include = ["setTristate", "isTristate"]
params = { stateChanged = ["state"] }
