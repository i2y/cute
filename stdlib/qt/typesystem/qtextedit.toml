# Typesystem for `stdlib/qt/qtextedit.qpi`. Multi-line edit
# widgets — QTextEdit (rich text + plain) and QPlainTextEdit
# (plain only, faster for code-editor scenarios).


[clang]
includes = ["${qt_core}", "${qt_gui}", "${qt_widgets}"]
std = "c++17"

[[classes]]
name = "QTextEdit"
kind = "object"
header = "${qt_widgets}/qtextedit.h"
comment = """
QTextEdit — multi-line rich-text edit widget. Use plainText for
content if rich-text isn't needed (or QPlainTextEdit, which is
faster). textChanged fires per-keystroke.
"""
include = ["clear", "copy", "cut", "paste", "selectAll", "undo", "redo", "setPlainText", "setHtml", "append", "insertPlainText", "insertHtml"]

[[classes]]
name = "QPlainTextEdit"
kind = "object"
header = "${qt_widgets}/qplaintextedit.h"
comment = """
QPlainTextEdit — multi-line plain-text edit. The editor of
choice for code-editor / log-viewer scenarios; lighter weight
than QTextEdit since there's no rich-text formatting.
"""
include = ["clear", "copy", "cut", "paste", "selectAll", "undo", "redo", "setPlainText", "appendPlainText", "appendHtml", "insertPlainText"]
